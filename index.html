<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Möchtest du mit mir auf ein Date? ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ff69b4);
}

.card{
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    width:min(90vw,420px);
    z-index:10;
}

h1{
    color:#e91e63;
    margin-bottom:20px;
    font-size:30px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.btn{
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    color:white;
}

.yes{
    background:#4CAF50;
}

.no{
    background:#ff1744;
    position:absolute;
}

.heart{
    position:absolute;
    animation:float 10s linear infinite;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }

    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

.rainHeart{
    position:fixed;
    font-size:30px;
    pointer-events:none;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }

    to{
        transform:translateY(100vh);
        opacity:0;
    }
}

@media (max-width:600px){

    h1{
        font-size:24px;
    }

    .btn{
        font-size:16px;
        padding:12px 20px;
    }

    .card{
        padding:30px 20px;
    }
}

</style>
</head>

<body>

<div id="roses"></div>

<div class="card">

<h1>🌹 Möchtest du mit mir auf ein Date? 🌹</h1>

<p>❤️ Ich verspreche auch, nett zu sein ❤️</p>

<button class="btn yes" id="yesBtn">
Ja ❤️
</button>

<button class="btn no" id="noBtn">
Nein 😢
</button>

</div>

<script>

const roses = document.getElementById("roses");

for(let i=0;i<25;i++){

    const rose=document.createElement("div");

    rose.innerHTML="🌹";

    rose.style.position="fixed";
    rose.style.left=Math.random()*100+"vw";
    rose.style.top=Math.random()*100+"vh";
    rose.style.fontSize=(20+Math.random()*30)+"px";
    rose.style.opacity="0.25";
    rose.style.pointerEvents="none";

    roses.appendChild(rose);
}

for(let i=0;i<40;i++){

    const heart=document.createElement("div");

    heart.innerHTML="❤️";
    heart.classList.add("heart");

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    heart.style.animationDuration=(5+Math.random()*8)+"s";

    document.body.appendChild(heart);
}

const noBtn=document.getElementById("noBtn");

function moveButton(){

    const maxX=window.innerWidth-noBtn.offsetWidth;
    const maxY=window.innerHeight-noBtn.offsetHeight;

    noBtn.style.left=Math.random()*maxX+"px";
    noBtn.style.top=Math.random()*maxY+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);

const yesBtn=document.getElementById("yesBtn");

yesBtn.addEventListener("click",()=>{

    const msg = document.createElement("h2");

msg.innerHTML = "💖 JAAAAA! 💖<br>Du hast mein Herz glücklich gemacht 🌹";

msg.style.position = "fixed";
msg.style.top = "50%";
msg.style.left = "50%";
msg.style.transform = "translate(-50%, -50%)";

msg.style.color = "#e91e63";
msg.style.fontSize = "32px";
msg.style.fontWeight = "bold";
msg.style.textAlign = "center";

msg.style.textShadow =
"0 0 10px white, 0 0 20px white, 0 0 30px white";

msg.style.zIndex = "9999";

document.body.appendChild(msg);
    for(let i=0;i<100;i++){

        const heart=document.createElement("div");

        heart.innerHTML="❤️";
        heart.classList.add("rainHeart");

        heart.style.left=Math.random()*100+"vw";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);
    }

    setTimeout(()=>{
        window.location.href="formular.html";
    },2500);
});

</script>

</body>
</html>
